<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="'Outfit', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#fafaf8" rx="12"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a" font-family="'Syne', Arial, sans-serif">Royal Smells AI Content Pipeline</text>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="#64748b">Automated social media post generation in 4 languages</text>

  <!-- Step 1: Input -->
  <rect x="30" y="130" width="130" height="150" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="95" y="168" text-anchor="middle" font-size="26">📦</text>
  <text x="95" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Input</text>
  <text x="95" y="216" text-anchor="middle" font-size="11" fill="#64748b">Product images</text>
  <text x="95" y="233" text-anchor="middle" font-size="11" fill="#64748b">CSV data</text>
  <text x="95" y="250" text-anchor="middle" font-size="11" fill="#64748b">Brand assets</text>

  <!-- Arrow -->
  <line x1="160" y1="205" x2="195" y2="205" stroke="#0d9488" stroke-width="2"/>
  <polygon points="196,205 184,199 184,211" fill="#0d9488"/>

  <!-- Step 2: Python Pipeline -->
  <rect x="195" y="130" width="130" height="150" rx="12" fill="#0d9488"/>
  <text x="260" y="168" text-anchor="middle" font-size="26">🐍</text>
  <text x="260" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Python</text>
  <text x="260" y="214" text-anchor="middle" font-size="11" fill="#ccfbf1">Pipeline</text>
  <text x="260" y="232" text-anchor="middle" font-size="11" fill="#ccfbf1">Batch processor</text>
  <text x="260" y="250" text-anchor="middle" font-size="11" fill="#ccfbf1">Data formatter</text>

  <!-- Arrow -->
  <line x1="325" y1="205" x2="360" y2="205" stroke="#0d9488" stroke-width="2"/>
  <polygon points="361,205 349,199 349,211" fill="#0d9488"/>

  <!-- Step 3: Gemini API -->
  <rect x="360" y="130" width="130" height="150" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="425" y="168" text-anchor="middle" font-size="26">✨</text>
  <text x="425" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Gemini API</text>
  <text x="425" y="214" text-anchor="middle" font-size="11" fill="#64748b">Text generation</text>
  <text x="425" y="232" text-anchor="middle" font-size="11" fill="#64748b">4 languages</text>
  <text x="425" y="250" text-anchor="middle" font-size="11" fill="#64748b">Caption writing</text>

  <!-- Arrow -->
  <line x1="490" y1="205" x2="525" y2="205" stroke="#0d9488" stroke-width="2"/>
  <polygon points="526,205 514,199 514,211" fill="#0d9488"/>

  <!-- Step 4: Google Imagen -->
  <rect x="525" y="130" width="130" height="150" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="590" y="168" text-anchor="middle" font-size="26">🎨</text>
  <text x="590" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Imagen 3</text>
  <text x="590" y="214" text-anchor="middle" font-size="11" fill="#64748b">Image generation</text>
  <text x="590" y="232" text-anchor="middle" font-size="11" fill="#64748b">Enhancement</text>
  <text x="590" y="250" text-anchor="middle" font-size="11" fill="#64748b">1080×1080 px</text>

  <!-- Arrow -->
  <line x1="655" y1="205" x2="690" y2="205" stroke="#0d9488" stroke-width="2"/>
  <polygon points="691,205 679,199 679,211" fill="#0d9488"/>

  <!-- Step 5: Output -->
  <rect x="690" y="130" width="90" height="150" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="735" y="168" text-anchor="middle" font-size="26">📱</text>
  <text x="735" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Posts</text>
  <text x="735" y="214" text-anchor="middle" font-size="11" fill="#0f766e">4 languages</text>
  <text x="735" y="231" text-anchor="middle" font-size="11" fill="#0f766e">AR / EN</text>
  <text x="735" y="248" text-anchor="middle" font-size="11" fill="#0f766e">KU / FA</text>

  <!-- Language pills -->
  <text x="400" y="324" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">OUTPUT LANGUAGES</text>
  <rect x="155" y="340" width="70" height="26" rx="13" fill="#0d9488" opacity="0.1"/>
  <text x="190" y="358" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Arabic</text>
  <rect x="240" y="340" width="80" height="26" rx="13" fill="#0d9488" opacity="0.1"/>
  <text x="280" y="358" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">English</text>
  <rect x="335" y="340" width="80" height="26" rx="13" fill="#0d9488" opacity="0.1"/>
  <text x="375" y="358" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Kurdish</text>
  <rect x="430" y="340" width="80" height="26" rx="13" fill="#0d9488" opacity="0.1"/>
  <text x="470" y="358" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Farsi</text>

  <!-- Tech stack -->
  <text x="400" y="408" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">TECH STACK</text>
  <rect x="155" y="422" width="80" height="28" rx="14" fill="#0d9488" opacity="0.12"/>
  <text x="195" y="441" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Python</text>
  <rect x="250" y="422" width="100" height="28" rx="14" fill="#0d9488" opacity="0.12"/>
  <text x="300" y="441" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Gemini API</text>
  <rect x="365" y="422" width="110" height="28" rx="14" fill="#0d9488" opacity="0.12"/>
  <text x="420" y="441" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Google Imagen</text>
  <rect x="490" y="422" width="80" height="28" rx="14" fill="#0d9488" opacity="0.12"/>
  <text x="530" y="441" text-anchor="middle" font-size="12" fill="#0d9488" font-weight="600">Pillow</text>
</svg>
